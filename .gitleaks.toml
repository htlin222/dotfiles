# gitleaks allowlist — test fixtures that intentionally contain
# credential-shaped strings to exercise the redaction pipeline.

title = "dotfiles gitleaks config"

[extend]
useDefault = true

[allowlist]
description = "Skip test fixtures, testdata directories, and vendored minified assets"
paths = [
  '''.*_test\.go$''',
  '''.*_test\.py$''',
  '''.*_test\.ts$''',
  '''.*\.test\.ts$''',
  '''.*\.test\.tsx$''',
  '''.*\.test\.js$''',
  '''.*_spec\.rb$''',
  '''testdata/''',
  '''fixtures/''',
  '''__fixtures__/''',
  # ttyd's bundled xterm.js web client (minified); its identifier names
  # trip generic-api-key's entropy check with no actual secrets present.
  '''config\.symlink/ttyd/index\.html''',
]
