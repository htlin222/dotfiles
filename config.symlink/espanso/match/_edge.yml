matches:
  - trigger: "nnnnnn"
    replace: "https://nhentai.to/random"
  - trigger: "hanmi"
    replace: "https://hanime1.me/"
  - trigger: "fbemoji"
    replace: "👍❤🥰😆😮🥲😡"
  # Pubmed Advanced search term
  - trigger: ":title"
    replace: "($|$[Title/Abstract])"
  - trigger: ":review"
    replace: '("review"[Publication Type])'
  - trigger: ":latest"
    replace: '("2023/01/01"[Date - Publication] : "3000"[Date - Publication])'
