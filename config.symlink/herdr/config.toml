onboarding = false
# herdr configuration
# Place this file at ~/.config/herdr/config.toml
#
# Ported from ~/.dotfiles/tmux/tmux.conf.symlink (Ctrl-a prefix workflow).
# Rationale for every override lives in ./README.md — read that before
# changing keys here, it explains what maps 1:1, what's approximated, and
# what has no herdr equivalent yet.

# Show first-run notification setup on startup.
# Missing also shows onboarding; set false after you've chosen.
# onboarding = true

[theme]
# Built-in themes: catppuccin, terminal, tokyo-night, dracula, nord,
#                  gruvbox, one-dark, solarized, kanagawa, rose-pine,
#                  vesper
# name = "catppuccin"

# Follow host terminal light/dark appearance and switch Herdr UI themes.
# Existing manual behavior is unchanged unless this is true.
# auto_switch = false
# dark_name = "catppuccin"
# light_name = "catppuccin-latte"

# Override individual color tokens on top of the base theme.
# Accepts: hex (#rrggbb), named colors, rgb(r,g,b), or panel_bg = "reset"
# [theme.custom]
# panel_bg = "reset"
# accent = "#f5c2e7"
# red = "#ff6188"
# green = "#a6e3a1"

[terminal]
# Executable used for new interactive panes.
# Empty means $SHELL, then /bin/sh.
default_shell = "/usr/bin/zsh"

# Startup mode for new interactive pane shells: "auto", "login", or "non_login".
# "auto" uses login shells on macOS and keeps the current behavior elsewhere.
# Forced to "login" so ~/.zprofile runs on BOTH macOS and Linux: this dotfiles
# setup puts most PATH/env (shellscripts, pyscripts, edirect, linuxbrew shellenv)
# in zprofile, which non-login shells skip. "auto" would leave Linux panes as
# non-login and drop all of that. zshrc's `typeset -U PATH` dedups, so nested
# login shells don't bloat PATH.
shell_mode = "login"

# CWD policy for new panes, tabs, and workspaces when no explicit --cwd is provided.
# Use "follow" to inherit the source pane/workspace, "home" for $HOME,
# "current" for Herdr's process directory, or a fixed path such as "~/Projects".
# new_cwd = "follow"

[update]
# Update channel used by background version checks and `herdr update`.
# Use "stable" for normal releases or "preview" for opt-in preview builds.
# channel = "stable"

# Check herdr.dev for new Herdr versions in the background.
# version_check = true

# Check herdr.dev for remote agent-detection manifest updates in the background.
# manifest_check = true

[keys]
# tmux used `set -g prefix None` + a manual C-a -> switch-client -T prefix
# binding, purely so it could hook im-select before entering prefix mode.
# herdr's prefix is a first-class option, so this is just:
prefix = "ctrl+a"

# Prefix-mode actions
# help = "prefix+?"
# settings = "prefix+s"
detach = ["prefix+d", "ctrl+q"]        # tmux: bind -n C-q detach-client (no-prefix)
reload_config = "prefix+r"             # tmux: bind r source-file ~/.tmux.conf (no shift)
# open_notification_target = "prefix+o"
workspace_picker = "prefix+w"          # closest herdr analog to tmux bind T (sesh popup) — no custom command needed
goto = ["prefix+g", "ctrl+g"]          # ctrl+g direct: tmux's Claude-pane-switcher habit; herdr's own agent panel replaces the custom script
# new_workspace = "prefix+shift+n"
# new_worktree = "prefix+shift+g"
# open_worktree = ""    # optional, unset by default
# remove_worktree = ""  # optional, unset by default; opens confirmation
# rename_workspace = "prefix+shift+w"
# close_workspace = "prefix+shift+d"
previous_workspace = "prefix+p"        # freed from previous_tab below (shift+left still covers tab switching)
next_workspace = "prefix+n"            # freed from next_tab below (shift+right still covers tab switching)
previous_agent = "shift+up"            # tmux: bind -n S-Up tmux_claude_nav.sh prev
next_agent = "shift+down"              # tmux: bind -n S-Down tmux_claude_nav.sh next
# focus_agent = ""        # optional indexed binding, e.g. "prefix+alt+1..9"
# remote_image_paste = "ctrl+v" # only active in herdr --remote; empty disables raw-key image paste
new_tab = "prefix+c"                    # tmux: bind c new-window (matches herdr default)
# rename_tab = "prefix+shift+t"
previous_tab = "shift+left"    # tmux: S-Left previous-window (prefix+p reassigned to previous_workspace above)
next_tab = "shift+right"       # tmux: S-Right / M-L next-window (prefix+n reassigned to next_workspace above)
# switch_tab = "prefix+1..9"
# switch_workspace = ""   # optional indexed binding, e.g. "prefix+shift+1..9"
# close_tab = "prefix+shift+x"
# rename_pane = "prefix+shift+p"
# edit_scrollback = "prefix+e"
# ctrl+h/j/k/l direct (vim-tmux-navigator style, no prefix needed).
# Trade-off: panes no longer receive raw C-h/C-j/C-k/C-l (shell clear-screen,
# readline kill-line, vim window nav inside a pane, etc.) — herdr eats them.
focus_pane_left = ["prefix+h", "alt+left", "ctrl+h"]    # tmux: h / M-Left
focus_pane_down = ["prefix+j", "alt+down", "ctrl+j"]    # tmux: j / M-Down
focus_pane_up = ["prefix+k", "alt+up", "ctrl+k"]        # tmux: k / M-Up
focus_pane_right = ["prefix+l", "alt+right", "ctrl+l"]  # tmux: l / M-Right
# cycle_pane_next = "prefix+tab"
# cycle_pane_previous = "prefix+shift+tab"
# last_pane = ""          # optional, unset by default; bind e.g. "prefix+tab" for global back-and-forth
split_vertical = "prefix+b"      # tmux: bind b split-window -h (side-by-side == herdr's "vertical divider")
split_horizontal = "prefix+v"    # tmux: bind v split-window -v (stacked == herdr's "horizontal divider")
# close_pane = "prefix+x"
# zoom = "prefix+z"       # legacy alias: fullscreen
resize_mode = ""          # unset: tmux never used a modal resize, it used direct repeatable H/J/K/L (ported below as [[keys.command]])
toggle_sidebar = "prefix+shift+b"  # freed up plain prefix+b for split_vertical above; tmux had no sidebar concept

# Navigate-mode movement. These local shortcuts win while navigate mode is open.
# They are independent from focus_pane_*. Do not include prefix+, esc, enter, tab, or 1..9 here.
# navigate_workspace_up = "up"
# navigate_workspace_down = "down"
# navigate_pane_left = "h"      # left arrow always focuses the pane to the left
# navigate_pane_down = "j"
# navigate_pane_up = "k"
# navigate_pane_right = "l"     # right arrow always focuses the pane to the right

# Custom commands use the same binding syntax.
# type = "shell" runs detached in the background.
# type = "pane" opens a temporary pane and closes it when the command exits.

# tmux: bind -r H/J/K/L resize-pane -L/-D/-U/-R 5 (repeatable, no modal entry)
# --amount is a FRACTION of the split axis (verified: 0.05 moved a 0.60 ratio to
# 0.65), NOT a cell count — so tmux's 5 meant 500% and slammed to the edge. Aim
# for ~3 cells per hit: width axis ~206 cols -> 0.015 (L/R), height ~57 rows ->
# 0.05 (U/D). Bump these if the step still feels too small.
[[keys.command]]
key = "prefix+shift+h"
type = "shell"
command = "herdr pane resize --direction left --amount 0.015"
description = "resize pane left (tmux: prefix+H)"

[[keys.command]]
key = "prefix+shift+j"
type = "shell"
command = "herdr pane resize --direction down --amount 0.05"
description = "resize pane down (tmux: prefix+J)"

[[keys.command]]
key = "prefix+shift+k"
type = "shell"
command = "herdr pane resize --direction up --amount 0.05"
description = "resize pane up (tmux: prefix+K)"

[[keys.command]]
key = "prefix+shift+l"
type = "shell"
command = "herdr pane resize --direction right --amount 0.015"
description = "resize pane right (tmux: prefix+L)"

# tmux: bind a split-window -v -l 3 (small fixed-height stacked split).
# herdr has no fixed-line split, only --ratio; 0.15 approximates "3 lines".
[[keys.command]]
key = "prefix+a"
type = "shell"
command = "herdr pane split --direction down --ratio 0.15"
description = "small split, approximates tmux prefix+a (-l 3)"

# tmux: bind i -> tmux_popup.sh (a floating popup pane). herdr 0.7.1 has no
# floating/overlay primitive, only in-layout splits — this is NOT equivalent,
# just the closest available approximation. See README.
[[keys.command]]
key = "prefix+i"
type = "shell"
command = "herdr pane split --direction down --ratio 0.25 --focus"
description = "quick scratch pane, approximates tmux popup (prefix+i) - not a real overlay"

# Legacy indexed shortcut config is still parsed for compatibility.
# Prefer switch_tab, switch_workspace, and focus_agent for new configs.
# [keys.indexed]
# tabs = ""       # e.g. "ctrl" makes ctrl+1..9 switch tabs directly
# workspaces = "" # e.g. "ctrl+shift" makes ctrl+shift+1..9 switch workspaces directly
# agents = ""     # e.g. "alt" makes alt+1..9 focus agent rows directly

# [worktrees]
# directory = "~/.herdr/worktrees"

[ui]
# Sidebar width (auto-scaled based on workspace names, this sets the default)
# sidebar_width = 26

# Minimum sidebar width when expanded (columns)
# sidebar_min_width = 18

# Maximum sidebar width when expanded (columns)
# sidebar_max_width = 36

# Terminal width at or below which Herdr uses the mobile single-column layout.
# Increase this for foldables, tablets, or wide phone terminals.
# mobile_width_threshold = 64

# Capture mouse input for Herdr's mouse UI.
# Set false to let the terminal handle normal clicks, such as Cmd-clicking URLs.
# Pane apps like lazygit and btop can still receive mouse when they request it.
# mouse_capture = true

# Optional modifier that forwards right-click hold/drag gestures to pane apps instead of opening Herdr's pane menu.
# Empty/off disables this. Shift is intentionally unsupported because terminals commonly reserve Shift+mouse.
# right_click_passthrough_modifier = ""

# Force a full redraw when the outer terminal regains focus.
# Set false to reduce visible flashing when switching back to Herdr.
# Trade-off: rare host terminal surface corruption may persist until the next full redraw.
# redraw_on_focus_gained = true

# Pane scrollback lines to scroll per mouse wheel notch.
# mouse_scroll_lines = 3

# Ask for confirmation before closing a workspace
# confirm_close = true

# Ask for a tab name before creating a new tab.
# Set false to create tabs immediately with generated names.
# prompt_new_tab_name = true

# Draw borders around split panes.
# pane_borders = true

# Keep split panes visually separated instead of sharing divider borders.
# pane_gaps = true

# Show detected/reported agent labels in split pane borders when no manual pane name is set.
# show_agent_labels_on_pane_borders = false

# Agent panel ordering: "spaces" (grouped by space) or "priority" (attention queue).
# "workspaces" is accepted as an alias for "spaces".
agent_panel_sort = "priority"

# Accent color for highlights, borders, and navigation UI.
# Accepts: hex (#89b4fa), named colors (cyan, blue, magenta), or rgb(r,g,b)
# accent = "cyan"

# Background notification popup delivery
show_agent_labels_on_pane_borders = true
[ui.toast]
# off = disable pop-up notifications
# herdr = show in-app toasts
# terminal = ask the outer terminal to show a desktop notification
# system = ask the OS notification service directly
# delivery = "off"
# delay_seconds = 1

delivery = "herdr"
[ui.toast.herdr]
# position = "bottom-right"

[ui.toast.clipboard]
# enabled = true
# position = "bottom-center"

# Play sounds when agents change state in background workspaces
[ui.sound]
# enabled = true
# Optional custom mp3 sound files. Relative paths are resolved from this config file's directory.
# path = "sounds/notification.mp3"   # one mp3 file for all sound notifications
# done_path = "sounds/done.mp3"      # overrides only finished notifications
# request_path = "sounds/request.mp3" # overrides only needs-attention notifications

# Per-agent overrides: default | on | off
# By default, droid is muted.
# [ui.sound.agents]
# droid = "off"

[session]
# Resume supported AI-agent panes into their native conversation sessions after
# a Herdr server restart. Requires official integrations that report session refs.
# resume_agents_on_restore = true

[remote]
# Whether herdr manages the ssh config used for the `herdr --remote` bridge.
# When true (default), herdr runs the bridge ssh through a generated config that
# includes your ~/.ssh/config first and adds ServerAliveInterval/
# ServerAliveCountMax as a fallback (so any keepalive you set yourself still
# wins) to survive idle network/NAT timeouts. Set false to run plain ssh against
# your ssh config unchanged — this does not force keepalive off, it only stops
# herdr from adding its own.
# manage_ssh_config = true

[experimental]
# Allow launching herdr from inside a herdr-managed pane.
# allow_nested = false
# Experimental local Kitty graphics rendering for attached clients.
# Requires a Kitty graphics-compatible outer terminal.
# kitty_graphics = false
# Save recent pane screen history across full server restarts.
pane_history = true
# While prefix mode is active, temporarily switch the macOS host input
# source to an ASCII-capable keyboard layout so prefix commands register
# even when a CJK IME is active, then restore the previous input source
# when prefix mode exits. macOS only; best-effort. Default: false.
#
# This is the direct replacement for tmux's manual
# `im-select com.apple.keylayout.ABC` hook on the C-a prefix binding.
switch_ascii_input_source_in_prefix = true
# Expose the focused pane's cursor to the outer terminal so macOS input
# methods keep tracking the candidate window when TUIs paint their own
# cursor (Claude Code, pi, codex). Trade-off: extra cursor visible for
# apps that hide it without painting a replacement (vim normal mode, etc.).
# reveal_hidden_cursor_for_cjk_ime = false
# Optional allow-list: only reveal for focused panes whose detected agent
# matches one of these names. Empty means apply to any focused pane.
# If the list contains no valid names, the reveal does not apply.
# Accepted: pi, claude, codex, gemini, cursor, devin, cline, opencode,
# copilot, kimi, kiro, droid, amp, grok, hermes, kilo, qodercli, qoder.
# cjk_ime_agents = []
# Cursor shape rendered when reveal_hidden_cursor_for_cjk_ime is true.
# Values: block, steady_block (default), underline, steady_underline, bar, steady_bar.
# cjk_ime_cursor_shape = "steady_block"

[advanced]
# Maximum scrollback buffer size in bytes retained per pane terminal.
# Matches Ghostty's default scrollback-limit behavior.
# scrollback_limit_bytes = 10000000
