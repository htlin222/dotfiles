# herdr-floax configuration — see floax.conf.example in the plugin root.
# Values are read each time the floating pane opens (no reload needed).

# Dialog-style sizing, matching the old tmux popup (-w 90% -h 80%): the
# margin shows the real workspace dimmed (snapshot backdrop).
width_pct = 90
height_pct = 80

# Actual binding lives in ../../config.toml ([[keys.command]] prefix+i).
key_hint = prefix+i

# Near-black dim backdrop instead of the plugin's default dark green —
# clearly darker than the terminal bg (#121212-ish) so the dimmed workspace
# margin reads as a layer *behind* the dialog.
backdrop = #0a0a10

# Match herdr's native modal style (keybinds window): accent-blue plain
# border, square corners. Values from herdr's Palette::catppuccin()
# (accent #89b4fa) + render_panel_shell (PLAIN border set). Needs the
# locally patched plugin (border/border_type keys are not upstream yet).
border = #89b4fa
border_type = plain

# box_bg intentionally UNSET: the zsh prompt paints its rows with an
# explicit bg matching the host terminal's background, so any other box
# color shows as stripes behind the prompt. Passing default bg through
# (Reset) keeps the whole interior the terminal bg — stripe-free and
# correct in both light and dark themes.
# box_bg = #181825
